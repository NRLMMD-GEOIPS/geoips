# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_scat/data/20230722_metopb_byu_uhr_tc2023al05don/DON_20230722_56263_B_A-product.nc
spec:
  globals:
    product_name: windbarbs
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: ascat_uhr_netcdf
    arguments: {}
    product:
      kind: product
      name: windbarbs
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_windbarbs
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: tc_fname
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/ascat_uhr.tc.windbarbs.imagery_windbarbs
      }
