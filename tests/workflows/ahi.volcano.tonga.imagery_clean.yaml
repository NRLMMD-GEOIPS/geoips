# script migration = done except (--tc_spec_template volc_tonga)
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fname: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_ahi/data/tonga_20220115T0430/*
spec:
  global-arguments:
    product_name: Infrared
    sector_list: None
  steps:
    reader:
      kind: reader
      name: ahi_hsd
    arguments: {}
    product:
      kind: product
      name: Infrared
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/ahi.tonga.volcano
      }
    sector_metadata_generators:
      kind: sector_metadata_generators
      name: volc_parser
      arguments: {
        trackfiles: !ENV $GEOIPS/tests/sectors/volc_csv/tonga_trackfile.csv
      }
