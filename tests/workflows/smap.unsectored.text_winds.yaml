# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_smap/data/RSS_smap_wind_daily_2021_09_26_NRT_v01.0.nc
spec:
  globals:
    product_name: unsectored
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: smap_remss_winds_netcdf
    arguments: {}
    product:
      kind: product
      name: unsectored
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: text_winds
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: text_winds_full_fname
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/smap.unsectored.text_winds
      }
