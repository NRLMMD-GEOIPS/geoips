  steps:
    reader:
      kind: reader
      name: amsua_mhs_mirs
    arguments: {}
    product:
      kind: product
      name: 183-3H
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: tc_fname
      arguments: {}
    feature_annotator:
      kind: feature_annotator
      name: tc_pmw
      arguments: {}
    gridline_annotator:
      kind: gridline_annotator
      name: tc_pmw
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/mhs_mirs.tc.<product>.imagery_annotated
      }
