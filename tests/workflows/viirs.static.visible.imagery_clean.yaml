# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.
apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_viirs/data/j02_sdr_20240925/*.h5
  command_line_args:
    compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/viirs.static.visible.imagery_clean
spec:
  global-arguments:
    presector: False
    product_db: False
    product_db_writer: None
    product_db_writer_kwargs: None
    product_name: Visible
    reader_defined_area_def: False
    window_start_time: None
    window_end_time: None
    sector_list: ["se_asia"]
  steps:
    reader:
      kind: reader
      name: viirs_sdr_hdf5
    arguments: {}
    product:
      kind: product
      name: Visible
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      arguments: {}
