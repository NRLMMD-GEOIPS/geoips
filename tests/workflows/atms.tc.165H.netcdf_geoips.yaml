# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_atms/data/n20_20230525_0336_tc2023wp02Mawar/*.h5
spec:
  globals:
    product_name: 165H
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: atms_hdf5
    arguments: {}
    product:
      kind: product
      name: 165H
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: netcdf_geoips
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geoips_netcdf_fname
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/atms.tc.<product>.netcdf_geoips
      }
