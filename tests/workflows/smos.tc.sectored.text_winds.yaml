# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_smos/data/SM_OPER_MIR_SCNFSW_20200216T120839_20200216T135041_110_001_7.nc
spec:
  globals:
    product_name: sectored
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: smos_winds_netcdf
    arguments: {}
    product:
      kind: product
      name: sectored
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: text_winds
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: text_winds_tc_fname
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/smos.tc.sectored.text_winds
      }
