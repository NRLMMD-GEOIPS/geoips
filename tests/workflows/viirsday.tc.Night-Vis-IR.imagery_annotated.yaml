# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_viirs/data/jpss/20210209/073600/VJ102DNB.A2021040.0736.002.2021040145245.nc
spec:
  globals:
    product_name: Night-Vis-IR
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: viirs_netcdf
    arguments: {}
    product:
      kind: product
      name: Night-Vis-IR
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: tc_fname
      arguments: {}
    feature_annotator:
      kind: feature_annotator
      name: tc_visir
      arguments: {}
    gridline_annotator:
      kind: gridline_annotator
      name: tc_visir
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/viirsday.tc.<product>.imagery_annotated
      }
