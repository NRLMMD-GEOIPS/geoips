# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.
apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_ami/data/20231208_0300_daytime/*.nc
  command_line_args:
    compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/ami.WV-Upper.unprojected_image
    logging_level: info
spec:
  global-arguments:
    presector: False
    product_db: False
    product_db_writer: None
    product_db_writer_kwargs: None
    product_name: WV-Upper
    reader_defined_area_def: False
    window_start_time: None
    window_end_time: None
    sector_list: None
  steps:
    reader:
      kind: reader
      name: ami_netcdf
    arguments: {
      self_register_dataset: True,
      self_register_source: True,
      self_register: LOW,
    }
    product:
      kind: product
      name: WV-Upper
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: unprojected_image
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      arguments: {}
