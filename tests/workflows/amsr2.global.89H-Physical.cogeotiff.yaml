# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.
apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_amsr2/data/AMSR2-MBT_v2r2_GW1_s202005180620480_e202005180759470_c202005180937100.nc
  command_line_args:
    compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/amsr2.global_20km_longlat.<product>.cogeotiff
spec:
  global-arguments:
    presector: False
    product_db: False
    product_db_writer: None
    product_db_writer_kwargs: None
    product_name: 89H-Physical
    reader_defined_area_def: False
    window_start_time: None
    window_end_time: None
    sector_list: ["global_20km_longlat"]
  steps:
    reader:
      kind: reader
      name: amsr2_netcdf
    arguments: {}
    product:
      kind: product
      name: 89H-Physical
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: cogeotiff
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geotiff_fname
      arguments: {}
