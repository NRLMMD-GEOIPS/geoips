# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.
apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  command_line_args:
    compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.<product>.imagery_clean
spec:
  global-arguments:
    presector: False
    product_db: False
    product_db_writer: None
    product_db_writer_kwargs: None
    product_name: None
    reader_defined_area_def: False
    window_start_time: None
    window_end_time: None
    sector_list: ["test_goes16_eqc_10km_edge_day_20200918T1950Z"]
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments: {
        resampled_read: True
      }
    product:
      kind: product
      name: nasa_dust_rgb
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      arguments: {}
