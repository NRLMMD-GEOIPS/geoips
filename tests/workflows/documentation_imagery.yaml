# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_hy2/data/hscat_20211202_080644_hy_2b__15571_o_250_2204_ovw_l2.nc
spec:
  globals:
    product_name: windspeed
    reader_defined_area_def: False
    sector_list: ["global_cylindrical"]
    minimum_coverage: 0 
  steps:
    reader:
      kind: reader
      name: scat_knmi_winds_netcdf
      arguments: {
        resampled_read: True,
      }
    product:
      kind: product
      name: windspeed
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      arguments: {}
