# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
spec:
  globals:
    product_name: windspeed
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: amsr2_remss_winds_netcdf
    arguments: {}
    product:
      kind: product
      name: windspeed
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: tc_clean_fname
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/amsr2_rss.tc.windspeed.imagery_clean
      }
