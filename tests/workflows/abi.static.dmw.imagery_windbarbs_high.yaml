# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.
apiVersion: geoips/v1
interface: products
family: order_based
name: windbarbs_dmw_high
docstring: The windbarbs_dmw_high product workflow.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20210929_0000/OR_ABI-L2-DMWVF*.nc
spec:
  globals:
    product_name: DMW-High
    reader_defined_area_def: False
    sector_list: ["goes_east"]
  steps:
    reader:
      kind: reader
      name: abi_l2_netcdf
    arguments:
      resampled_read: True,
    algorithm:
      kind: algorithm
      name: windbarbs_dmw
      arguments:
        pressure_level_range: [0, 400]
        output_data_range: [0, 200]
        input_units: m s-1
        output_units: kts
        min_outbounds: crop
        max_outbounds: crop
        norm: false
        inverse: false
    colormapper:
      kind: colormapper
      name: matplotlib_linear_norm
      arguments:
        data_range: [0, 200]
        cbar_ticks: [0, 20, 40, 60, 80, 100, 120, 140, 160, 180, 200]
        cmap_name: viridis
        cbar_label: "Derived Motion Wind (kts)\nHigh Level: 400 - 0 hPa"
    output_formatter:
      kind: output_formatter
      name: imagery_windbarbs
      arguments: {
        thinning: 1,  # skip data points
        length: 5.0,
        width: 1.5,
        sizes_dict: {
          height: 0.7,
          spacing: 0.3,
        },
        rain_size: 0,
      }
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      arguments: {}
    coverage_checker:
      kind: coverage_checker
      name: windbarbs
      arguments:
        minimum_coverage: 0
    output_checker:
      kind: output_checker
      name: 
      arguments:
        compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.<product>.imagery_windbarbs
