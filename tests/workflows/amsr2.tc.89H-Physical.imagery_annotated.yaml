# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_amsr2/data/AMSR2-MBT_v2r2_GW1_s202005180620480_e202005180759470_c202005180937100.nc
spec:
  globals:
    product_name: 89H-Physical
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: amsr2_netcdf
    arguments: {}
    product:
      kind: product
      name: 89H-Physical
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: tc_fname
      arguments: {}
    feature_annotator:
      kind: feature_annotator
      name: tc_pmw
      arguments: {}
    gridline_annotator:
      kind: gridline_annotator
      name: tc_pmw
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/amsr2.tc.<product>.imagery_annotated
      }
