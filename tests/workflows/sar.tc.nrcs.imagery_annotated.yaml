# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_sar/data/STAR_SAR_20181025203206_WP312018_31W_FIX_3km.nc
spec:
  globals:
    product_name: nrcs
    reader_defined_area_def: False
  steps:
    reader:
      kind: reader
      name: sar_winds_netcdf
    arguments: {}
    product:
      kind: product
      name: nrcs
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: tc_fname
      arguments: {}
    feature_annotator:
      kind: feature_annotator
      name: default
      arguments: {}
    gridline_annotator:
      kind: gridline_annotator
      name: default
      arguments: {}
    output_checker:
      kind: output_checker
      name: PLUGIN_PROVIDED
      arguments: {
        compare_path: !ENV $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/sar.tc.nrcs.imagery_annotated
      }
