# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.
apiVersion: geoips/v1
interface: products
family: order_based
name: read_test
docstring: Read test.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_ahi/data/20200405_0000/HS_H08*
  command_line_args:
    compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/ahi.tc.<product>.geotiff
    logging_level: debug
spec:
  global-arguments:
    presector: False
    product_db: False
    product_db_writer: None
    product_db_writer_kwargs: None
    product_name: WV
    reader_defined_area_def: False
    window_start_time: None
    window_end_time: None
    sector_list: None
  steps:
    reader:
      kind: reader
      name: ahi_hsd
      arguments: {
        resampled_read: True
      }
    product:
      kind: product
      name: WV
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: geotiff_standard
      arguments: {}
    filename_formatter:
      kind: filename_formatter
      name: geotiff_fname
      arguments: {}
