# roles/test_data/defaults/main.yml
#
# Test datasets required at each installation tier.
# Each entry is a name recognised by `geoips config install <name>`.
#
# These are intentionally in the role defaults (not group_vars) so the
# test_data role is self-contained and can be used standalone.

base_test_datasets:
  - test_data_amsr2

full_test_datasets:
  - test_data_amsub
  - test_data_arctic_weather_satellite
  - test_data_atms
  - test_data_cygnss
  - test_data_fci
  - test_data_gfs
  - test_data_gpm
  - test_data_modis
  - test_data_multi_scan_times
  - test_data_saphir
  - test_data_sar
  - test_data_scat
  - test_data_seviri
  - test_data_smap
  - test_data_smos
  - test_data_tpw
  - test_data_viirs

site_test_datasets:
  - test_data_clavrx
  - test_data_fusion
  - test_data_geocolor

private_test_datasets:
  - test_data_mint
