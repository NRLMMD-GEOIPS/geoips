# roles/source_repos/tasks/main.yml
#
# Installs plugin source repos via clone (+ fallback if branch missing) + pip install.
# Fortran repos have an explicit ordering constraint.
#
# Tasks are inlined (no include_tasks) to avoid tag inheritance issues with
# ansible-core when --tags site is used.
#
---
# ---- Standard plugin repos (alphabetical order is fine) ----
- name: "Clone standard plugin repos"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
    version: "{{ geoips_modified_branch if (geoips_modified_branch | default('') | length > 0) else omit }}"
  loop: "{{ plugin_repos }}"
  loop_control:
    loop_var: repo_name
  register: _std_clone
  failed_when: false
  tags: [site]

- name: "Clone standard plugin repos on default branch (branch '{{ geoips_modified_branch }}' not found)"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
  loop: "{{ plugin_repos }}"
  loop_control:
    loop_var: repo_name
  when: geoips_modified_branch | default('') | length > 0
  tags: [site]

- name: "Pip install standard plugin repos"
  ansible.builtin.pip:
    name: "{{ geoips_packages_dir }}/{{ repo_name }}"
    editable: "{{ pip_editable | bool }}"
    extra_args: "{{ pip_extra_args }}"
    state: present
  loop: "{{ plugin_repos }}"
  loop_control:
    loop_var: repo_name
  tags: [site]

# ---- Fortran chain (ORDER MATTERS) ----
- name: "Clone fortran repos"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
    version: "{{ geoips_modified_branch if (geoips_modified_branch | default('') | length > 0) else omit }}"
  loop: "{{ fortran_repos_ordered }}"
  loop_control:
    loop_var: repo_name
  register: _fort_clone
  failed_when: false
  tags: [site]

- name: "Clone fortran repos on default branch (branch '{{ geoips_modified_branch }}' not found)"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
  loop: "{{ fortran_repos_ordered }}"
  loop_control:
    loop_var: repo_name
  when: geoips_modified_branch | default('') | length > 0
  tags: [site]

- name: "Pip install fortran repos"
  ansible.builtin.pip:
    name: "{{ geoips_packages_dir }}/{{ repo_name }}"
    editable: "{{ pip_editable | bool }}"
    extra_args: "{{ pip_extra_args }}"
    state: present
  loop: "{{ fortran_repos_ordered }}"
  loop_control:
    loop_var: repo_name
  tags: [site]

# ---- Private repos (when enabled) ----
- name: "Clone private plugin repos"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
    version: "{{ geoips_modified_branch if (geoips_modified_branch | default('') | length > 0) else omit }}"
  loop: "{{ private_plugin_repos }}"
  loop_control:
    loop_var: repo_name
  register: _priv_clone
  failed_when: false
  when: geoips_use_private_plugins | bool
  tags: [site]

- name: "Clone private plugin repos on default branch (branch '{{ geoips_modified_branch }}' not found)"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
  loop: "{{ private_plugin_repos }}"
  loop_control:
    loop_var: repo_name
  when:
    - geoips_use_private_plugins | bool
    - geoips_modified_branch | default('') | length > 0
  tags: [site]

- name: "Pip install private plugin repos"
  ansible.builtin.pip:
    name: "{{ geoips_packages_dir }}/{{ repo_name }}"
    editable: "{{ pip_editable | bool }}"
    extra_args: "{{ pip_extra_args }}"
    state: present
  loop: "{{ private_plugin_repos }}"
  loop_control:
    loop_var: repo_name
  when: geoips_use_private_plugins | bool
  tags: [site]

# ---- Private fortran repos (ORDER MATTERS, after fortran chain) ----
- name: "Clone private fortran repos"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
    version: "{{ geoips_modified_branch if (geoips_modified_branch | default('') | length > 0) else omit }}"
  loop: "{{ private_fortran_repos }}"
  loop_control:
    loop_var: repo_name
  register: _privfort_clone
  failed_when: false
  when: geoips_use_private_plugins | bool
  tags: [site]

- name: "Clone private fortran repos on default branch (branch '{{ geoips_modified_branch }}' not found)"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
  loop: "{{ private_fortran_repos }}"
  loop_control:
    loop_var: repo_name
  when:
    - geoips_use_private_plugins | bool
    - geoips_modified_branch | default('') | length > 0
  tags: [site]

- name: "Pip install private fortran repos"
  ansible.builtin.pip:
    name: "{{ geoips_packages_dir }}/{{ repo_name }}"
    editable: "{{ pip_editable | bool }}"
    extra_args: "{{ pip_extra_args }}"
    state: present
  loop: "{{ private_fortran_repos }}"
  loop_control:
    loop_var: repo_name
  when: geoips_use_private_plugins | bool
  tags: [site]

# ---- Extra plugins passed via build arg / CLI ----
- name: "Parse extra_plugin_packages into a list"
  ansible.builtin.set_fact:
    extra_plugins_list: "{{ extra_plugin_packages.split(',') | map('trim') | select | list }}"
  when: extra_plugin_packages | length > 0
  tags: [base, full, site]

- name: "Clone extra plugin repos"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
    version: "{{ geoips_modified_branch if (geoips_modified_branch | default('') | length > 0) else omit }}"
  loop: "{{ extra_plugins_list | default([]) }}"
  loop_control:
    loop_var: repo_name
  register: _extra_clone
  failed_when: false
  when: extra_plugins_list is defined and extra_plugins_list | length > 0
  tags: [base, full, site]

- name: "Clone extra plugin repos on default branch (branch '{{ geoips_modified_branch }}' not found)"
  ansible.builtin.git:
    repo: "{{ geoips_repo_url }}/{{ repo_name }}.git"
    dest: "{{ geoips_packages_dir }}/{{ repo_name }}"
  loop: "{{ extra_plugins_list | default([]) }}"
  loop_control:
    loop_var: repo_name
  when:
    - extra_plugins_list is defined
    - extra_plugins_list | length > 0
    - geoips_modified_branch | default('') | length > 0
  tags: [base, full, site]

- name: "Pip install extra plugin repos"
  ansible.builtin.pip:
    name: "{{ geoips_packages_dir }}/{{ repo_name }}"
    editable: "{{ pip_editable | bool }}"
    extra_args: "{{ pip_extra_args }}"
    state: present
  loop: "{{ extra_plugins_list | default([]) }}"
  loop_control:
    loop_var: repo_name
  when: extra_plugins_list is defined and extra_plugins_list | length > 0
  tags: [base, full, site]
