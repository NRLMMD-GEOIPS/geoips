# tests/ansible/playbooks/test_data.yml
#
# Downloads test datasets required for integration testing.
# Kept separate from install.yml because test data is NEVER baked into
# Docker images — it is downloaded on the CI runner (or dev machine)
# and mounted into containers at runtime.
#
# Usage:
#   # Base datasets only
#   ansible-playbook playbooks/test_data.yml --tags base
#
#   # Base + full datasets
#   ansible-playbook playbooks/test_data.yml --tags base,full
#
#   # Everything including site + private datasets
#   ansible-playbook playbooks/test_data.yml --tags base,full,site \
#     -e geoips_use_private_plugins=true
#
#   # Override the download location
#   ansible-playbook playbooks/test_data.yml --tags base \
#     -e geoips_testdata_dir=/data/geoips-testdata
#
# Tasks are inlined here (no role indirection) because include_tasks
# inside a role does not always resolve vars correctly at loop scope.
---
- name: Download GeoIPS test data
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Ensure GEOIPS_TESTDATA_DIR exists
      ansible.builtin.file:
        path: "{{ geoips_testdata_dir }}"
        state: directory
        mode: "0755"
      tags: [base, full, site]

    # ---- base tier datasets ----
    - name: Install base test datasets
      ansible.builtin.command:
        cmd: "geoips config install {{ item }}"
        creates: "{{ geoips_testdata_dir }}/{{ item }}"
      environment:
        GEOIPS_TESTDATA_DIR: "{{ geoips_testdata_dir }}"
      register: _td_base
      changed_when: "'SUCCESS' in _td_base.stdout"
      loop: "{{ base_test_datasets | default([]) }}"
      tags: [base]

    # ---- full tier datasets ----
    - name: Install full test datasets
      ansible.builtin.command:
        cmd: "geoips config install {{ item }}"
        creates: "{{ geoips_testdata_dir }}/{{ item }}"
      environment:
        GEOIPS_TESTDATA_DIR: "{{ geoips_testdata_dir }}"
      register: _td_full
      changed_when: "'SUCCESS' in _td_full.stdout"
      loop: "{{ full_test_datasets | default([]) }}"
      tags: [full]

    # ---- site tier datasets ----
    - name: Install site test datasets
      ansible.builtin.command:
        cmd: "geoips config install {{ item }}"
        creates: "{{ geoips_testdata_dir }}/{{ item }}"
      environment:
        GEOIPS_TESTDATA_DIR: "{{ geoips_testdata_dir }}"
      register: _td_site
      changed_when: "'SUCCESS' in _td_site.stdout"
      loop: "{{ site_test_datasets | default([]) }}"
      tags: [site]

    # ---- private datasets (only when enabled) ----
    - name: Install private test datasets
      ansible.builtin.command:
        cmd: "geoips config install {{ item }}"
        creates: "{{ geoips_testdata_dir }}/{{ item }}"
      environment:
        GEOIPS_TESTDATA_DIR: "{{ geoips_testdata_dir }}"
      register: _td_priv
      changed_when: "'SUCCESS' in _td_priv.stdout"
      loop: "{{ private_test_datasets | default([]) }}"
      when: geoips_use_private_plugins | bool
      tags: [site]
