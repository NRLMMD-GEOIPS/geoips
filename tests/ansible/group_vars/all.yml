# ---------------------------------------------------------------------------
# Paths – fall back to env vars (Docker sets them), then sensible defaults.
# Override any of these with -e on the command line.
# ---------------------------------------------------------------------------
geoips_packages_dir: "{{ lookup('env', 'GEOIPS_PACKAGES_DIR') | default('/packages', true) }}"
geoips_outdirs: "{{ lookup('env', 'GEOIPS_OUTDIRS') | default('/output', true) }}"
geoips_testdata_dir: "{{ lookup('env', 'GEOIPS_TESTDATA_DIR') | default('/geoips_testdata', true) }}"
geoips_dependencies_dir: "{{ lookup('env', 'GEOIPS_DEPENDENCIES_DIR') | default('/app/dependencies', true) }}"
geoips_repo_url: "{{ lookup('env', 'GEOIPS_REPO_URL') | default('https://github.com/NRLMMD-GEOIPS', true) }}"

# Branch to attempt after cloning each repo.  Empty string = stay on default.
geoips_modified_branch: "{{ lookup('env', 'GEOIPS_MODIFIED_BRANCH') | default('', true) }}"

# Set true to include private/proprietary plugin repos
geoips_use_private_plugins: "{{ lookup('env', 'GEOIPS_USE_PRIVATE_PLUGINS') | default(false, true) }}"

# Comma-separated list of extra plugin repo names to install (build-arg friendly)
extra_plugin_packages: "{{ lookup('env', 'EXTRA_PLUGINS') | default('', true) }}"

# true  = pip install -e (editable, for bare-metal dev — source tree IS the package)
# false = pip install    (build from source — package goes into site-packages, smaller image)
# The Dockerfile passes -e pip_editable=false.  Bare-metal defaults to true.
pip_editable: true

# Extra arguments forwarded to every pip install call (requirements, geoips,
# extras, and plugin repos).  The Dockerfile passes '--no-binary :all:' so
# every dependency is compiled from source inside the container.  Bare-metal
# defaults to empty (use wheels when available).
pip_extra_args: ""

# ---------------------------------------------------------------------------
# Settings repos (non-plugin repos cloned into GEOIPS_PACKAGES_DIR)
# ---------------------------------------------------------------------------
settings_repos:
  - .vscode
  - .github
  - geoips_ci

# ---------------------------------------------------------------------------
# Plugin source repos – installed with `pip install -e`
# ---------------------------------------------------------------------------
plugin_repos:
  - data_fusion
  - geoips_clavrx
  - geoips_plugin_example
  - recenter_tc
  - template_basic_plugin

# ORDER MATTERS – each entry is installed sequentially.
# fortran_utils → rayleigh → ancildat → synth_green must precede geocolor.
fortran_repos_ordered:
  - fortran_utils
  - rayleigh
  - ancildat
  - synth_green
  - geocolor

private_plugin_repos:
  - ryglickicane
  - tc_mint

# Must install AFTER the fortran chain above.
private_fortran_repos:
  - lunarref
  - true_color

# ---------------------------------------------------------------------------
# Test datasets — which datasets belong to each install tier.
# Each entry is a name recognised by `geoips config install <name>`.
# These live here (not in role defaults) so they are always available
# regardless of how the test_data playbook is invoked.
# ---------------------------------------------------------------------------
base_test_datasets:
  - test_data_amsr2

full_test_datasets:
  - test_data_amsub
  - test_data_arctic_weather_satellite
  - test_data_atms
  - test_data_cygnss
  - test_data_fci
  - test_data_gfs
  - test_data_gpm
  - test_data_modis
  - test_data_multi_scan_times
  - test_data_saphir
  - test_data_sar
  - test_data_scat
  - test_data_seviri
  - test_data_smap
  - test_data_smos
  - test_data_tpw
  - test_data_viirs

site_test_datasets:
  - test_data_clavrx
  - test_data_fusion
  - test_data_geocolor

private_test_datasets:
  - test_data_mint
