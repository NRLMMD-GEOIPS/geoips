    finish: 2026-02-26
- title: 'Add json based resource usage plotting capabilities'
  description: |
    Allow plotting resource usage statistics, as enabled through procflow config
    files. 

    This relies on json resource usage output files being enabled through the procflow
    config, then a separate call to plot_json_files to plot the results.

    Note this plotting capability was initially set up for only static sector
    processing.  The test script includes both TC and static, which completes
    successfully, except the resulting checkpoint usage plot includes only the TC
    but not the static sector.  This will be fixed in a future PR to properly track
    all sector types.
  files:
    deleted:
    - ''
    moved:
    - ''
    added:
    - 'geoips/utils/memusg/boxplots.py'
    - 'geoips/utils/memusg/dataframe_utils.py'
    - 'geoips/utils/memusg/plot_json_files.py'
    modified:
    - ''
  related-issue:
    internal: geoips#1027
  date:
    start: 2026-02-24
    finish: 2026-02-26
