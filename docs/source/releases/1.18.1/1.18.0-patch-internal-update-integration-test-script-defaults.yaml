testing:
- title: Have fail on missing data default to True
  description: |
    Rather than having to update every plugin repo integration test script to add the
    required fail_on_missing_data flag, just have it default to True in the main
    run bash script function in the main geoips repo.  If the flag is supported in
    a plugin repo, it will be passed in appropriately, if it is not supported in a
    plugin repo, it will just default to True and the plugin repo integration tests
    won't break.

    Also print the value of fail_on_missing_data to terminal.
  files:
    modified:
    - tests/integration_tests/test_integration.py
  related-issue:
    internal: geoips#1029 - 1.18.0 updates
  date:
    start: 2026-03-05
    finish: 2026-03-06
- title: Allow disabling dumping all failed log contents to terminal
  description: |
    Set GEOIPS_TEST_SUPPRESS_PYTEST_FAILED_LOG_CONTENTS env var to True to avoid printing
    all failed log output from integration tests to terminal.
    
    When running interactively might be nice to suppress, if running exhaustively
    don't suppress and all log output will be contained in a single log file.
  files:
    modified:
    - tests/integration_tests/test_integration.py
    - geoips/filenames/base_paths.py
  related-issue:
    internal: geoips#1029 - 1.18.0 updates
  date:
    start: 2026-03-05
    finish: 2026-03-06
- title: Consolidated env variable naming for all GEOIPS_TEST env vars
  description: |
    Prepend all test related environment variables with GEOIPS_TEST.

    * GEOIPS_TEST_OUTPUT_CHECKER_THRESHOLD_IMAGE 0.05
    * GEOIPS_TEST_PRINT_TEXT_OUTPUT_CHECKER_TO_CONSOLE True
    * GEOIPS_TEST_SUPPRESS_PYTEST_FAILED_LOG_CONTENTS False
    * GEOIPS_TEST_SECTOR_CREATE_ANNOTATED_OUTPUTS False
    * GEOIPS_TEST_SECTOR_CREATE_GEOTIFF_OUTPUTS False
    * GEOIPS_TEST_PROMPT_TO_OVERWRITE_COMPARISON_FILE_IF_MISMATCH False
  files:
    modified:
    - tests/integration_tests/test_integration.py
    - geoips/filenames/base_paths.py
    - tests/integration_tests/tiny_sectors/tiny_sectors_geostationary.sh
    - geoips/plugins/classes/output_checkers/image.py
    - geoips/plugins/classes/output_checkers/text.py
  related-issue:
    internal: geoips#1029 - 1.18.0 updates
  date:
    start: 2026-03-05
    finish: 2026-03-06
