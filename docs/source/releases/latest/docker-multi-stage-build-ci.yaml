continuous integration:
- title: 'Docker multi-stage build and CI caching infrastructure'
  description: |
    Overhauls the GeoIPS Docker build and CI/CD pipeline to use a multi-stage
    Dockerfile with cross-run build caching and simplified Ansible configuration.

    * Docker image built in 8 stages (``base-os`` / ``deps`` / ``geoips-base`` /
      ``geoips-full`` / ``geoips-site`` / ``dev`` / ``dev-quick`` / ``production``).
    * ``uv pip install --system`` replaces ``pip install`` throughout the
      Dockerfile for faster Python package resolution.
    * cartopy Natural Earth shapefiles are cloned and symlinked in the ``deps``
      cache layer so they never rebuild on source-only changes.
    * Consolidated apt invocations into a single ``RUN`` with the unstable source
      added first, then one ``apt-get update`` + ``apt-get install``.
    * Ansible ``python_env`` and ``cartopy_shapefiles`` roles are skipped at
      Docker build time (``--skip-tags python_env,cartopy_shapefiles``) because
      ``uv`` and the Dockerfile handle those steps natively.
    * Test data loaded via a simplified ``test_data.yml`` Ansible playbook with
      inline ``loop:`` tasks and static task names (eliminates ``include_tasks``
      scoping issues and ``{{ item }}`` template warnings).
    * Decoupled ``testdata-*`` and ``build-dev*`` Makefile targets.
    * ``.dockerignore`` updated to exclude build artifacts while preserving
      ``.git`` for worktree development.
    * Dev container configuration (``.devcontainer/``) supports worktree-based
      development with automatic ``.git`` shim handling.
  files:
    added:
    - '.devcontainer/devcontainer.json'
    - 'tests/ansible/scripts/devcontainer-setup.sh'
    - 'tests/ansible/group_vars/all.yml'
    modified:
    - 'Dockerfile'
    - '.dockerignore'
    - 'Makefile'
    - 'tests/ansible/playbooks/test_data.yml'
    - 'tests/ansible/roles/python_env/tasks/main.yml'
    - 'tests/ansible/roles/cartopy_shapefiles/tasks/main.yml'
    deleted: []
    moved: []
  related-issue:
    number: null
    repo_url: 'https://github.com/NRLMMD-GEOIPS/geoips'
  date:
    start: null
    finish: null
