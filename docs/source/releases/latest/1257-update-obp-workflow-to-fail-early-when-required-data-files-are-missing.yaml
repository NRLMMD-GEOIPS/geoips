enhancement:
- title: 'Update order-based procflow to fail early when required data files are missing'
  description: |
    Add early validation of file inputs in the order-based procflow. Before processing begins, the workflow now checks that all file paths required by reader, output_checker, and sector steps exist on the filesystem. If any paths are missing, the workflow terminates immediately with a FileNotFoundError listing every missing file and the step that requires it, rather than failing partway through processing.
