bug fix:
- title: 'Raise PluginValidationError with summarized output when pydantic validation fails'
  description: |
    When a YAML plugin fails pydantic validation, the raw pydantic ValidationError
    exposed one error per union variant, producing dozens of confusing field errors.
    A new PluginValidationError class now catches this and re-raises a summary
    grouped by field, identifying the plugin by name, interface, package, and file.
