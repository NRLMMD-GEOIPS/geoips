refactor:
- title: 'GeoIPS Utilize Pluginify Package'
  description: |
    In an effort to share our plugin registry code as an independent package outside of
    GeoIPS, this PR removes all references to plugin registry code. I've created a
    separate package called 'pluginify' which copied over all of the deleted code, then
    modified it to be mostly agnostic of GeoIPS, besides a few references in
    documentation and optional imports for testing. The optional import will be removed
    soon. I've posted this repository on TestPyPi and it can currently be installed
    via `python3 -m pip install --index-url https://test.pypi.org/simple/ --no-deps pluginify`
    or it can be cloned via 'https://github.com/NRLMMD-GEOIPS/pluginify.git' and
    installed with `pip install -e`. We hope to have this on main PyPi once this is
    fully tested.

    Essentially, a package has to implement it's own interfaces and validators for
    plugins of those interfaces. They then can make use of pluginify's code to create
    plugin registries and load / create plugins as was previously done in GeoIPS. The
    benefit of moving this code out of GeoIPS is that other python packages can create
    their own interfaces / plugin types alongside validators without having to install
    the large dependency that is GeoIPS.
  files:
