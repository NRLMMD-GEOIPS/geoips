bug fix:
- title: 'Reject unimplemented spec.defaults at validation instead of ignoring it'
  description: |
    ``WorkflowSpecModel.defaults`` (per-kind argument defaults) was accepted by
    the schema but never consumed by the runtime, so a spec that set it was
    silently ignored. A ``_reject_defaults`` validator now rejects it at
    validation with a clear message until the runtime wires it in, mirroring the
    existing ``_reject_retention_by_kind`` behavior. The related test and the
    ``retention_by_kind`` field comment are updated to reflect the reject-until-
    wired behavior.
  files:
    modified:
    - geoips/pydantic_models/v1/workflows.py
    - tests/unit_tests/pydantic_models/v1/test_workflow_spec_model.py
  related-issue:
    number: null
    repo_url: ''
  date:
