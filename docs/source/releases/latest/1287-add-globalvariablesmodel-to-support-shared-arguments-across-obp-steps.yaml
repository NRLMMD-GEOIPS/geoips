enhancement:
- title: 'Add GlobalVariablesModel for shared OBP workflow arguments'
  description: |
    Adds a new GlobalVariablesModel to the pydantic models. It groups together
    the handful of settings that apply to a whole Order-Based Procflow workflow
    rather than to a single step, with a bit of validation to catch fields that
    need to be set together.
