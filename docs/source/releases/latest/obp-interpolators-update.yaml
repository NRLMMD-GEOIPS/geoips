enhancement:
- title: 'OBP Interpolators Update'
  description: |
    Adds support for inserting interpolator steps in a workflow plugin. If an
    interpolator step is specified, it MUST depend on two other steps, one of which
    must be a data source, and the other must be a sector. This way it can accurately
    interpolate data from that source to that sector.
