validation:
- title: 'Turn on Pydantic Validators and remove JSON Schema'
  description: |
    There have been multiple PRs that have added pydantic validators whose job is to
    replace the current JSON Schema validators used for YAML-based plugins. This PR
    activates all of those pydantic validators and removes all JSON Schema code. Since
    these pydantic validators completely replace our JSON schema validators, we have no
    need for the schema code or the validator code found in interfaces/base.py.

    Noteably, all pydantic validators are passing tests just fine, besides the product
    pydantic models which are failing for the 'layered' data fusion products. This is
    an issue with the actual data fusion products as those 'layered' products are
    missing the 'variables' field in all of their products. Those products should be
    updated accordingly so all tests pass on GeoIPS' side.

    Output of ``pytest -v --no-fail-on-missing-data`` with data_fusion UNINSTALLED:

    ```
    ============================================================================= short test summary info ==============================================================================
    FAILED tests/integration_tests/test_integration.py::test_integ_lint_test_script[$geoips_repopath/tests/utils/check_code.sh all $geoips_repopath] - RuntimeError: CalledProcessError, see output in log /home/evan/geoips/geoips_packages/outdirs/logs/pytests/integration/20260303.200929.check_code.sh_all_geoips.log
    ============================================== 1 failed, 3764 passed, 53 deselected, 63 xfailed, 1580 warnings in 3690.64s (1:01:30) ===============================================
    ```
