continuous integration:
- title: 'Skip full integration tests on low-RAM runners'
  description: |
    Adds a ``MemTotal`` check to the integration test step in the CI workflow.
    If the host has less than 17 GB RAM (e.g. GitHub-hosted runners), the full
    integration test suite is gracefully skipped with a log message. Base
    integration tests continue to run everywhere.

    This prevents OOM kills (exit code 137) on standard GitHub runners while
    preserving full test coverage on high-RAM self-hosted machines.
