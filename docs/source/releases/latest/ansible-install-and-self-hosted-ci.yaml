installation:
- title: Replace install shell scripts with Ansible playbooks
  description: |
    Replace legacy shell scripts (base_install.sh, full_install.sh, site_install.sh,
    check_system_requirements.sh) with Ansible playbooks and roles in
    tests/ansible/.  The same playbooks run on bare-metal and inside Docker
    containers using a three-tier tag model (base, full, site).

    Rework the multi-stage Dockerfile to delegate to ansible playbooks.  Add new
    targets: dev (editable site), dev-quick (editable base), and production
    (source-free slim runtime).
  files:
    added:
    - tests/ansible/
    modified:
    - Dockerfile
    - Makefile
    - .dockerignore
  related-issue:
    number: 1261
  date:
    start: 2025-09
    finish: 2026-06-25
continuous integration:
- title: Add self-hosted runner integration test workflow
  description: |
    Add integ_test.yaml CI workflow on self-hosted runners that builds a Docker
    image, downloads test datasets via ansible, and runs base and full integration
    tests.  Test data is mounted as a runtime volume (never baked into images).

    Rename ci.yml to integ_test.yaml to reflect its integration-test focus.
  files:
    added:
    - .github/workflows/integ_test.yaml
    modified:
    - .github/workflows/ci.yml
  related-issue:
    number: 1261
  date:
    start: 2025-09
    finish: 2026-06-25
enhancement:
