enhancement:
- title: 'Add GeoipsError base class and workflow-domain exceptions'
  description: |
    Introduce GeoipsError as the base class for all GeoIPS-specific exceptions.
    Existing exception classes (FileFormatError, MissingRequiredXarrayMetadata,
    etc.) are retro-fitted with multiple inheritance. Add seven new typed
    exceptions for workflow operations: WorkflowSpecError, PluginResolutionError,
    DependencyCycleError, DanglingOutputError, DataTreeSchemaError,
    RetentionConfigError, and BoundaryIOError.
  files:
    modified:
    - geoips/errors.py
  related-issue:
    number: 1309
    repo_url: 'https://github.com/NRLMMD-GEOIPS/geoips'
