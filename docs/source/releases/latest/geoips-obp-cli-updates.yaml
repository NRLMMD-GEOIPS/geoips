enhancement:
- title: 'OBP CLI Updates'
  description: |
    Updates to v1 workflow models and 'geoips run order_based <workflow_name>' /
    'geoips test workflow <workflow_name>' CLI commands. Updates include refactoring
    the 'test' section of a workflow and adding support for overrides in workflow
    plugins. These can be specified in the test section of a workflow or at the command
    line via '-[Ss]', '-[Kk]', '-[Gg]' flags via the 'geoips run order_based' command.
    In order to apply overrides, GeoIPS will fully expand a workflow plugin, replace
    relevant portions of the workflow with the contents specified as an override, then
    revalidate the modified workflow.

    Added documentation and fixed failing unit tests as well. New unit tests to come for
    new functionality added.
  files:
    modified:
      - docs/dev/running_order_based_procflow.rst
