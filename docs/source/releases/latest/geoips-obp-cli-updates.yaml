enhancement:
- title: 'OBP CLI Updates'
  description: |
    Updates to v1 workflow models and 'geoips run order_based <workflow_name>' /
    'geoips test workflow <workflow_name>' CLI commands. Updates include refactoring
    the 'test' section of a workflow and adding support for overrides in workflow
    plugins. These can be specified in the test section of a workflow or at the command
    line via '-S', '-K', '-G' flags via the 'geoips run order_based' command. In order
    to apply overrides, GeoIPS will fully expand a workflow plugin, replace relevant
    portions of the workflow with the contents specified as an override, then revalidate
    the modified workflow.
  files:
    modified:
      - geoips/commandline/geoips_run.py
      - geoips/commandline/geoips_test.py
      - geoips/interfaces/yaml_based/workflows.py
      - geoips/plugins/yaml/workflows/test_product.yaml
      - geoips/pydantic_models/v1/workflows.py
  related-issue:
    number: null
    repo_url: ''
  date:
    start: null
    finish: null
