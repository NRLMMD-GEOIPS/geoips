Refactor:
- title: 'Convert Majority of Module-Based Plugins to Class-Based'
  description: |
    This update includes a large refactoring of the module-based side of the codebase.
    The OBP introduced the idea of true class-based plugins so we could perform
    operations on datasets being processed before and after the enter / exit a plugin.
    This way we can transform the data into the expected type that the plugin specifies.
    Currently, nearly all class-based plugins are generated at runtime via pluginify,
    and we cannot easily depict what a plugin of a certain type has access to via
    inheritance. It's also not clear how these plugins are being converted at runtime.

    This update converts all module-based plugins (asides from procflow plugins) to
    true class-based plugins. Additionally, this update moves shared functionality from
    certain plugin types onto their base classes, so they no longer need to import
    functionality from one or more plugins of the same type. They can just access this
    functionality via self.<common_func>...

    Finally, updated pyproject.toml to reflect the version of pluginify needed to
    support this new functionality.
