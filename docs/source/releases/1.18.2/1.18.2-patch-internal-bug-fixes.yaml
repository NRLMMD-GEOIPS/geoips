- title: Disable git prompts by default in config_geoips
  description: |
    GIT_ASKPASS="", SSH_ASKPASS="", GIT_TERMINAL_PROMPT=1
  files:
    modified:
    - setup/config_geoips
  related-issue:
    internal: geoips#1029 - 1.18.2 updates
  date:
    start: 2026-04-29
    finish: 2026-04-29
- title: Add gitall command to fully update all repos to  specified branch, if it exists
  description: |
    If specified branch does not exist, update to latest on default branch.
    End on a command that *should* pass for all repos, and print information at the
    end indicating such, and suggesting a follow on gitall status command to review the
    final status of all repos (ensure the final gitall pull -p is the final output seen
    on all repos, since if that fails, it indicates you have modified files locally,
    so prompt user to check that the gitall pull -p's passed, and to go fix the individual
    repos if any of the gitall pull's failed.)

    Additionally, redirect all output from gitall commands to logs for reference.
  files:
    modified:
    - setup/bash_setup/gitall
  related-issue:
    internal: geoips#1029 - 1.18.2 updates
  date:
    start: 2026-04-14
    finish: 2026-04-14
- title: Allow writing install logs to specified path
  description: |
    If $GEOIPS_INSTALL_LOG_BASEDIR is specified, write install logs there rather than
    default $GEOIPS_OUTDIRS/logs/install.
  files:
    modified:
    - setup/bash_setup/gitall
  related-issue:
    internal: geoips#1029 - 1.18.2 updates
  date:
    start: 2026-04-14
    finish: 2026-04-14
