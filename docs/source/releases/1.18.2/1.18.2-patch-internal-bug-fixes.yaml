testing:
- title: Do not wrap console script names during unit tests for geoips expose
  description: |
    If console script names wrap in the table output, the tests will fail because
    it can't find the expected console script.

    Add column_width argument to expose_geoips_commands, and pass in the max len of
    all console script names from the unit test, to ensure each console script name
    is included in the output, and not wrapped.

    Note we will later move this from geoips/geoips_utils.py to
    geoips/commandline/geoips_expose.py, but for now just ensure the tests pass as is.
  files:
    modified:
    - geoips/geoips_utils.py
    - tests/unit_tests/commandline/test_expose.py
  related-issue:
    internal: geoips#1029 - 1.18.2 updates
  date:
    start: 2026-05-12
    finish: 2026-05-12
installation:
