bug fixes:
- title: Update image output checker so the diff image mode and input image modes are all RGBA
  description: |
    With 12.1.0 pillow version, RGB raw output image mode will fail when comparing against
    RGBA input images.  pillow 12.0.x implicitly converted to consistent modes, but
    12.1.x does not.  To ensure modes are consistent for pixelmatch call, convert current
    and comparison image both to RGBA, and set diff images to RGBA as well.

    We can't just set the diff image modes to the input/comparison image modes, because
    not all modes are compatible with pixelmatch.  Previously Palette mode (P) would also
    be implicitly converted to RGBA, resulting in a successful pixelmatch comparison.
    If input, comparison, and diff images were all consistently mode 'P', the pixelmatch
    comparison would still fail with ValueError.

    To ensure consistentcy for all modes, explicitly convert all imagery to RGBA before
    performing the pixelmatch comparison.
  files:
    modified:
    - geoips/plugins/classes/output_checkers/image.py
  related-issue:
    internal: geoips#1029 - 1.18.0 updates
  date:
    start: 2026-03-09
    finish: 2026-03-24
