  - title: "Update tiny sector test scripts to copy both global dataset images, and tiny sector images to example_test_imagery_output"
    description: |
      For easier evaluation, copy all tiny sector outputs to example_test_imagery_output.
      Also, only copy files if they exist, to avoid IO Errors in the output.
      Test scripts still do not fail for missing output images (the geoips return
      should catch it appropriately), but only attempt to copy if they exist.
    files:
      modified:
        - 'tests/example_scripts/global_terminator_satzen.sh'
        - 'tests/integration_tests/tiny_sectors/tiny_sectors_geostationary.sh'
    related-issue:
      internal: geoips#1004
    date:
      start: 2025-12-29
      finish: 2025-12-29
  - title: "Update tiny sector test script to produce annotated tiny sector image outputs on request"
    description: |
      If GEOIPS_CREATE_TINY_SECTOR_TEST_ANNOTATED_OUTPUTS=True, then produce annotated
      image outputs for both Day-Only and Night-Only test products for reference.
      By default DO NOT run these annotated outputs, to avoid duplicate processing.

      To ensure unique filenames, updated geoips_fname to allow extra kwarg, so it
      can be passed in command line to add an orig flag to the original passed in
      product and opposite for the other product (Day vs Night).
    files:
      modified:
        - "geoips/plugins/modules/filename_formatters/geoips_fname.py"
        - "tests/integration_tests/tiny_sectors/tiny_sectors_geostationary.sh"
    related-issue:
      internal: geoips#1004
    date:
      start: 2026-01-07
      finish: 2026-01-07
