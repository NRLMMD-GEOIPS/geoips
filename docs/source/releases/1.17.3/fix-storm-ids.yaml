  - title: "Add invest_storm_id field to bdeck parser, and update invest_storm_id to include storm start datetime"
    description: |
      * Rather than just storing invest_number with bdeck parser, also store invest_storm_id
        to be consistent with other storm id handling.
      * This allows consistent handling of invest storm ids across different data sources.
      * invest_storm_id of format bbNNyyyyYYYYMMDDHH, e.g. al9020262026080106,
        where bb is basin, NN is storm number, yyyyYYYYMMDDHHMM is year and
        storm start datetime.  Storm start datetime is pulled from the filename
        if it is defined there, otherwise it pulls from the first entry in the
        bdeck file.
      * NOTE previously invest storm id would just be bbNNyyyy. This change adds
        the storm start datetime to ensure uniqueness across invests with the
        same basin and number but different start times.
      * NOTE we do not include delimiter in invest storm id so it is clear that it is
        a single id when appending the current storm synoptic/fix time to assemble a
        specific TC area_id.
    files:
      deleted:
        - ""
      moved:
        - ""
      added:
        - ""
      modified:
        - "geoips/plugins/modules/sector_metadata_generators/bdeck_parser.py"
        - "geoips/sector_utils/tc_tracks.py"
    date:
      start: 2026-01-05
      finish: 2026-01-05
  - title: "Store storm_start_datetime_from_filename_of_current_deck_file and storm_start_datetime_from_first_line_of_current_deck_file separately, and use storm_start_datetime_from_filename_of_current_deck_file as overall storm_start_datetime if it exists (otherwise fall back to storm_start_datetime_from_first_line_of_current_deck_file)"
    description: |
      * If storm start datetime is defined in the filename, use that as the overall storm_start_datetime.
        This allows consistent storm ids across files even if individual bdeck files have different storm start datetimes.
      * If storm start datetime is not defined in the filename, fall back to using the storm start datetime
        from the first bdeck file processed (storm_start_datetime_from_first_line_of_current_deck_file). We must ALWAYS have a storm start datetime defined.
    files:
      deleted:
        - ""
      moved:
        - ""
      added:
        - ""
      modified:
        - "geoips/plugins/modules/sector_metadata_generators/bdeck_parser.py"
    date:
      start: 2026-01-05
      finish: 2026-01-05
