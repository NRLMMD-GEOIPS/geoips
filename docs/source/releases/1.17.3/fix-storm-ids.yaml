  - title: "Update sector_utils tc_tracks.py to inclue TC position time in area id and not include storm name"
    description: |
      * No longer include storm name in area id for simplicity and to avoid issues with name changes.
      * Include TC position time in area id to ensure uniqueness for each storm location.
      * Note storm_id still does not include storm position time, so we have a single id for the entire storm.
      * Also note area_id includes both storm start datetime and position time for invests,
        to ensure uniqueness across multiple invests with same basin/number but different start times,
        as well as multiple positions for the same invest.
      * area_ids of format

        * bbNNyyyy-YYYYMMDDHH for numbered storm (no storm start datetime)
        * bbNNyyyyYYYYMMDDHH-YYY2M2D2H2 for invest (with storm start datetime)
        * E.g., stormid-YYYYMMDDHH for either invest or numbered storm, where stormid
          has no delimiters, either for invests or numbered storms
    files:
      deleted:
        - ""
      moved:
        - ""
      added:
        - ""
      modified:
        - "geoips/sector_utils/tc_tracks.py"
    date:
      start: 2026-01-05
      finish: 2026-01-05
  - title: "Allow output_type_dir for tc_fname.py, to support tc_clean_fname.py and tc_fname.py going to separate directories."
    description: |
      * No longer requiring output_type_dir for all filename formatters, but allow passing
        output_type_dir to tc_fname.py to support tc_clean_fname.py and tc_fname.py going to separate directories.
      * Since tc_clean_fname.py is a derivative of tc_fname.py, it makes sense to allow
        output_type_dir to be passed to tc_fname.py to support this use case.
      * tc_clean_fname.py calls tc_fname.py internally to generate the base filename,
        and passes in output_type_dir output_type+"_clean" to ensure separate output directories.
      * Alternatively, we could have created a separate function within tc_file_naming.py and
        have both tc_fname.py and tc_clean_fname.py call that function rather than
        having tc_clean_fname.py calling tc_fname directly, but this approach is simpler.
    files:
      deleted:
        - ""
      moved:
        - ""
      added:
        - ""
      modified:
        - "geoips/plugins/modules/filename_formatters/tc_clean_fname.py"
        - "geoips/plugins/modules/filename_formatters/tc_fname.py"
    date:
      start: 2026-01-05
      finish: 2026-01-05
  - title: "Standardize storm ids used in filenames vs file paths for tc_fname and tc_clean_fname, etc"
    description: |
      * General standard will be to use the full storm_id (including storm start
        datetime for invests) for TC file paths using the tc_file_naming.py
        tc_storm_basedir function.
      * TC file names will typically use a simplified storm ID, not including the
        storm start datetime.
      * Typically we will want to use the default storm_id or area_id whenever possible
        (in file paths or generic geoips_fname outputs, where people are not "used",
        to anything and we want consistency more than anything),
        and only use special cases (upper case, remove storm start datetime, etc) for
        specific purposes (people are used to the filenames just having WP992023, not
        the inscrutable WP9920232023071900)
    files:
