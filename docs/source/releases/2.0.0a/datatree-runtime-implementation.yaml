enhancement:
- title: 'Implement DataTree runtime for the order-based procflow'
  description: |
    Add a DataTree-backed runtime for the order-based procflow (OBP). Workflow
    execution now produces an xr.DataTree with per-step nodes carrying provenance
    attrs (output_token, plugin_name, plugin_kind, gc_status). The Workflow
    composite class uses a Strategy-pattern RetentionPolicy and Kahn's topological
    sort for step ordering. New pydantic schema fields (depends_on, keep, outputs,
    retention, defaults) are validated with cycle detection and dangling-output
    checking. The OrderBased procflow is now a class-based plugin accepting
    WorkflowPluginModel, WorkflowSpecModel, or dict inputs.
  files:
