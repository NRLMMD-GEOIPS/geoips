apiVersion: geoips/v1
interface: workflows
family: order_based
name: abi.static.dmw.imagery.windbarbs
docstring: A windbarbs_dmw_high workflow.
spec:
  steps:
    sector:
      kind: sector
      name: goes_east
    reader:
      kind: reader
      name: abi_l2_netcdf
      arguments:
        resampled_read: True
    interpolator:
      kind: interpolator
      name: interp_gauss
      depends_on: [reader, sector]
      arguments:
        varlist: 
          - "wind_speed"
          - "wind_direction"
          - "pressure"
    algorithm:
      kind: algorithm
      name: windbarbs_dmw
      depends_on: [interpolator]
      arguments:
        product_name: DMW-High
        variables: 
          - "wind_speed"
          - "wind_direction"
          - "pressure"
        pressure_level_range: [0, 400]
        output_data_range: [0, 200]
        input_units: m s-1
        output_units: kts
        min_outbounds: crop
        max_outbounds: crop
        norm: false
        inverse: false
    coverage_checker:
      kind: coverage_checker
      name: windbarbs
      depends_on: [algorithm, sector]
      arguments:
        minimum_coverage: 0
        variables: 
          - "wind_speed"
          - "wind_direction"
          - "pressure"
    colormapper:
      kind: colormapper
      name: matplotlib_linear_norm
      arguments:
        data_range: [0, 200]
        cbar_ticks: [0, 20, 40, 60, 80, 100, 120, 140, 160, 180, 200]
        cmap_name: viridis
        cbar_label: "Derived Motion Wind (kts)\nHigh Level: 400 - 0 hPa"
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [algorithm, coverage_checker, sector]
      arguments:
        product_name: DMW-High
    output_formatter:
      kind: output_formatter
      name: imagery_windbarbs
      depends_on: [algorithm, colormapper, filename_formatter, sector]
      arguments:
        product_name: DMW-High
