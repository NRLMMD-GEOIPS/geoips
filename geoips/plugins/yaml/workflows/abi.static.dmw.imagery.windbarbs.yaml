# script migration = done 
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: abi.static.dmw.imagery.windbarbs
docstring: The windbarbs_dmw_high product workflow.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20210929_0000/OR_ABI-L2-DMWVF*.nc
spec:
  globals:
    product_name: DMW-High
    # sector_list: ["goes_east"]
    minimum_coverage: 0
    variables: ["wind_speed", "wind_direction", "pressure"]
  steps:
    sector:
      kind: sector
      name: goes_east
    reader:
      kind: reader
      name: abi_l2_netcdf
      arguments:
        resampled_read: True
    algorithm:
      kind: algorithm
      name: windbarbs_dmw
      arguments:
        product_name: DMW-High
        variables: ["wind_speed", "wind_direction", "pressure"]
        pressure_level_range: [0, 400]
        output_data_range: [0, 200]
        input_units: m s-1
        output_units: kts
        min_outbounds: crop
        max_outbounds: crop
        norm: false
        inverse: false
    coverage_checker:
      kind: coverage_checker
      name: windbarbs
      depends_on: [algorithm, sector]
    colormapper:
      kind: colormapper
      name: matplotlib_linear_norm
      arguments:
        data_range: [0, 200]
        cbar_ticks: [0, 20, 40, 60, 80, 100, 120, 140, 160, 180, 200]
        cmap_name: viridis,
        cbar_label: "Derived Motion Wind (kts)\nHigh Level: 400 - 0 hPa",
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [algorithm, coverage_checker, sector]
    output_formatter:
      kind: output_formatter
      name: imagery_windbarbs
      depends_on: [algorithm, colormapper, filename_formatter, sector]
    # output_checker:
    #   kind: output_checker
    #   name: plugin_provided
    #   arguments:
    #     compare_path: $GEOIPS_PACKAGES_DIR/geoips/tests/outputs/abi.static.<product>.imagery_windbarbs,
