interface: workflows
family: order_based
name: ob_nasa_dust_rgb
docstring: |
  The nasa_dust_rgb workflow configuration.
spec:
  global_arguments:
    window_start_time: null
    window_end_time: null
    product_name: None
    reader_defined_area_def: False
    presector: False
    product_db: False
    product_db_writer: null
    product_db_writer_kwargs: null
    sector_list: []
  steps:
    interpolator:
      kind: interpolator
      name: interp_gauss
      arguments:
        sigmaval: 10000
    algorithm:
      kind: algorithm
      name: nasa_dust_rgb
      arguments: {}
    coverage_checker:
      kind: coverage_checker
      name: rgba
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments:
        colormapper:
          kind: colormapper
          name: cmap_rgb
          arguments: {}
        filename_formatter:
          kind: filename_formatter
          name: geoips_fname
          arguments:
            suffix: ".png"