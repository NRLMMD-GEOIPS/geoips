interface: workflows
family: order_based
name: ob_IR_BD
docstring: |
  The IR_BD product_defaults configuration.
spec:
  global_arguments:
    window_start_time: null
    window_end_time: null
    product_name: None
    reader_defined_area_def: False
    presector: False
    product_db: False
    product_db_writer: null
    product_db_writer_kwargs: null
    sector_list: []
  steps:
    interpolator:
      kind: interpolator
      name: interp_nearest
      arguments: {}
    algorithm:
      kind: algorithm
      name: single_channel
      arguments:
        output_data_range: [-90.0, 40.0]
        input_units: Kelvin
        output_units: celsius
        min_outbounds: crop
        max_outbounds: crop
        norm: null
        inverse: null
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments:
        colormapper:
          kind: colormapper
          name: IR_BD
          arguments:
            data_range: [-90.0, 40.0]
        filename_formatter:
          kind: filename_formatter
          name: geoips_fname
          arguments:
            suffix: ".png"
