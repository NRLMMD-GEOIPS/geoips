apiVersion: geoips/v1
interface: workflows
family: order_based
name: example_workflow
package: geoips
docstring: |
  Example order-based-procflow workflow exercising the full plugin chain.

  Demonstrates a complete DataTree-based DAG: reader -> algorithm ->
  colormapper / gridlines / filename -> output_formatter, with explicit
  ``depends_on`` edges. Intended as a reference fixture for the OBP runtime.
spec:
  outputs: [output_formatter]
  steps:
    reader:
      kind: reader
      name: geoips_netcdf
      depends_on: []
      arguments: {}

    algorithm:
      kind: algorithm
      name: single_channel
      depends_on: [reader]
      arguments:
        output_data_range: [-90.0, 30.0]
        input_units: Kelvin
        output_units: celsius
        min_outbounds: crop
        max_outbounds: crop
        norm: false
        inverse: false

    colormap:
      kind: colormapper
      name: Infrared
      depends_on: []
      arguments:
        data_range: [-90.0, 30.0]

    gridlines:
      kind: gridline_annotator
      name: default
      depends_on: []
      arguments: {}

    filename:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [algorithm]
      arguments:
        suffix: ".png"

    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      depends_on: [algorithm, colormap, gridlines, filename]
      arguments: {}
