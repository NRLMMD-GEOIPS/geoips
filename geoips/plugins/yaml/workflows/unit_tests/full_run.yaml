apiVersion: geoips/v1
interface: workflows
family: order_based
name: full_run
docstring: |
  11.2 µm Infrared.

  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 µm Infrared.
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  # outputs:
  #   abi:Infrared:
  #     policy: on_failure # always
  #     output_checker_arguments:
  #       compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.Infrared.imagery_clean/20200918.195020.goes-16.abi.Infrared.test_goes16_eqc_3km_day_20200918T1950Z.100p00.noaa.3p0.png
  # steps:
  #   reader:
  #     area_def: null
  #   abi:Infrared:
  #     spec:
  #       steps:
  #         algorithm:
  #           output_units: Kelvin
  # kinds:
  #   readers:
  #     satellite_zenith_angle_cutoff: 80
  # globals:
  #   sector_list: global_cylindrical
  #   logging_level: info
spec:
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments:
        chans: ['B14BT']
    algorithm:
      kind: algorithm
      name: single_channel
      depends_on: [reader]
      arguments:
        output_data_range: [-90.0, 30.0]
        input_units: Kelvin
        output_units: celsius
        min_outbounds: crop
        max_outbounds: crop
        norm: false
        inverse: false
    colormapper:
      kind: colormapper
      name: Infrared
      depends_on: []
      arguments:
        data_range: [-90.0, 30.0]
    gridlines:
      kind: gridline_annotator
      name: default
      depends_on: []
      arguments: {}
    features:
      kind: feature_annotator
      name: default
      depends_on: []
      arguments: {}
    sector:
      kind: sector
      name: goes_east
      depends_on: []
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      depends_on: [algorithm, colormapper, gridlines, features, sector]
      arguments:
        product_name: Infrared
        product_name_title: G16 Infrared @ 11.2 um
        output_fnames: [!ENV $GEOIPS_OUTDIRS/infrared_full_run.png]
