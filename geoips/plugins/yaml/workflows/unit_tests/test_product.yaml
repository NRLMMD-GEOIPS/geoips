apiVersion: geoips/v1
interface: workflows
family: order_based
name: test_product
docstring: |
  11.2 um Infrared.

  This product utilizes channel 14 (11.2 um) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 um Infrared.

test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.Infrared.imagery_clean
      output_checker_name: image
  steps:
    abi_Infrared:
      spec:
        steps:
          algorithm:
            output_units: Kelvin
  kinds:
    readers:
      satellite_zenith_angle_cutoff: 80
  globals:
    sector_list: global_cylindrical
    logging_level: info

spec:
  steps:
    sector:
      kind: sector
      name: test_goes16_eqc_3km_day_20200918T1950Z
      depends_on: []

    reader:
      kind: reader
      name: abi_netcdf
      arguments:
        variables: ["B14BT"]

    abi_Infrared:
      kind: product
      name: [abi, Infrared]
      depends_on: [reader, sector]

    gridlines:
      kind: gridline_annotator
      name: default
      depends_on: []

    features:
      kind: feature_annotator
      name: default
      depends_on: []

    check_coverage:
      kind: coverage_checker
      name: masked_arrays
      depends_on: [abi_Infrared.algorithm, sector]
      arguments:
        variable_name: data

    create_filenames:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [abi_Infrared.algorithm, sector, check_coverage]
      arguments:
        product_name: Infrared

    output_formatter:
      kind: output_formatter
      name: imagery_clean
      depends_on:
        - abi_Infrared.algorithm
        - abi_Infrared.colormapper
        - create_filenames
        - gridlines
        - features
        - sector
      arguments:
        product_name: Infrared
        product_name_title: G16 Infrared @ 11.2 um