apiVersion: geoips/v1
interface: workflows
family: order_based
name: test_product
docstring: |
  11.2 µm Infrared.

  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 µm Infrared.
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  outputs:
    abi.Infrared:
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.Infrared.imagery_clean/20200918.195020.goes-16.abi.Infrared.test_goes16_eqc_3km_day_20200918T1950Z.100p00.noaa.3p0.png
      token: FAKE_TOKEN
  steps:
    reader:
      area_def: null
    abi.Infrared:
      spec:
        steps:
          algorithm:
            output_units: Kelvin
  kinds:
    readers:
      satellite_zenith_angle_cutoff: 80
  globals:
    sector_list: global_cylindrical
    logging_level: info
spec:
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments:
        variables: ['B14BT']
    product:
      kind: product
      name: [abi, Infrared]
      arguments: {}
    output_checker:
      kind: output_checker
      name: image
      arguments:
        compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.Infrared.imagery_clean.low_memory/20200918.195020.goes-16.abi.Infrared.test_goes16_eqc_3km_night_20200918T1950Z.100p00.noaa.3p0.png
        output_products:
          - !ENV ${GEOIPS_OUTDIRS}/preprocessed/annotated_imagery/Tests-x-Goes_East/x-x-x/Infrared/abi/20200918.195020.goes-16.abi.Infrared.test_goes16_eqc_3km_day_20200918T1950Z.100p00.noaa.3p0.png
