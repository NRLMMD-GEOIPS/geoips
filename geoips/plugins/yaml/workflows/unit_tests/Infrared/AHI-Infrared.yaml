apiVersion: geoips/v1
kind: Workflow
# In SSP can specify product without specifying source, then rely on the SSP to find the
# correct product. We can't easily do that in the OBP...
name: AHI-Infrared
family: order_based
interface: workflows
docstring: |
  Infrared product for the AHI sensor
spec:
  steps:
    read_ahi:
      kind: reader
      name: ahi_hsd
      arguments:
        chans: ["B13BT"]
    infarared_workflow:
      kind: workflow
      name: Infrared
      arguments:
        apply_single_channel:
          output_data_range: [-90, 30]
        infrared_colormap:
          data_range: [-90, 30]
