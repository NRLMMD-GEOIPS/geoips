apiVersion: geoips/v1
kind: Workflow
name: output-imagery-annotated
family: order_based
interface: workflows
docstring: |
  A workflow stub for outputting data using the imagery annotated output formatter.
spec:
  steps:
    gridlines:
      kind: gridline_annotator
      name: default
      depends_on: []
      arguments: {}
    features:
      kind: feature_annotator
      name: default
      depends_on: []
      arguments: {}
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
      arguments:
        product_name: Infrared
        product_name_title: G16 Infrared @ 11.2 um
        output_fnames: [!ENV $GEOIPS_OUTDIRS/infrared_full_run.png]