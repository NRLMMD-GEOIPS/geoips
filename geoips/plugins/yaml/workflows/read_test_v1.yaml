apiVersion: geoips/v1
interface: workflows
family: order_based
name: read_test_v1
docstring: |
  11.2 µm Infrared.

  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 µm Infrared.
spec:
  steps:
    read_abi_L1_data:
      kind: reader
      name: abi_netcdf
      arguments:
        area_def: None
        fnames: None
        metadata_only: False
        resampled_read: False
        sectored_read: False
        self_register: None
        self_register_source: None
        self_register_dataset: None
        variables: None
    apply_single_channel_algorithm:
      kind: algorithm
      name: single_channel
      arguments:
        variables: ['B14BT']
        output_data_range: [-90.0, 30.0]
        input_units: Kelvin
        output_units: celsius
        min_outbounds: crop
        max_outbounds: crop
        norm: null
        inverse: null
    # workflow:
    #     name: read_test
