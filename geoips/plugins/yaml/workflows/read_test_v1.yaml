spec:
  retention: keep_referenced
  outputs: [read_abi_L1_data]
  global_arguments:
    presector: False
    product_db: False
    product_db_writer: null
    product_db_writer_kwargs: null
    product_name: null
    reader_defined_area_def: False
    sector_list: []
    window_start_time: null
    window_end_time: null
  steps:
    read_abi_L1_data:
      kind: reader
      name: abi_netcdf
      keep: true
      arguments:
        variables: ['B14BT']
