apiVersion: geoips/v1
interface: workflows
family: order_based
name: read_test_v1
docstring: |
  11.2 µm Infrared.

  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 µm Infrared.
spec:
  global-arguments:
    window_start_time: None
    window_end_time: None
    product_name: None
    reader_defined_area_def: False
    no_presectoring: True
    product_db: False
    product_db_writer: None
    product_db_writer_kwargs: None
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments:
        variables: ['B14BT']
    algorithm:
      kind: algorithm
      name: single_channel
      arguments:
        variables: ['B14BT']
        output_data_range: [-90.0, 30.0]
        input_units: Kelvin
        output_units: celsius
        min_outbounds: crop
        max_outbounds: crop
        norm: null
        inverse: null
    # workflow:
    #     name: read_test
