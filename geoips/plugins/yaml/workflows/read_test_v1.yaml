apiVersion: geoips/v1
interface: workflows
family: order_based
# source_names: [abi]
name: read_test_v1
docstring: |
    Use the windbarbs product_defaults for ABI L2 DMWV products.
description: Use the windbarbs product_defaults for ABI L2 DMWV products.
spec:
  steps:
    reader:
      kind: reader
      name: abi_l2_netcdf
      arguments: {}
        # variables: ['B14BT']
    apply_windbarbs_dmv_algorithm:
      kind: algorithm
      name: windbarbs_dmw
      arguments:
        product_name: DMW-High
        variables: ["just for test"]
        pressure_level_range: [0, 400]
        output_data_range: [0, 200]
        input_units: m s-1
        output_units: kts
        min_outbounds: crop
        max_outbounds: crop
        norm: null
        inverse: null
        var_map:
          speed: wind_speed
          direction: wind_direction
          pressure: pressure
