apiVersion: geoips/v1
interface: workflows
family: order_based
name: test_product
docstring: |
  11.2 µm Infrared.

  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 µm Infrared.
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.<product>.imagery_clean
  overrides:
    steps:
      - abi_Infrared.spec.steps.algorithm.output_units='Kelvin'
    kinds:
      - readers.self_register=False
    globals:
      - sector_list='global_cylindrical'
      - logging_level='info'
spec:
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments:
        variables: ['B14BT']
    product:
      kind: product
      name: [abi, Infrared]
      arguments: {}
