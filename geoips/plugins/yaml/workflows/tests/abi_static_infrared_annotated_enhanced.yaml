# script migration = done 
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: abi_static_infrared_annotated_enhanced
docstring: |
  11.2 µm Infrared.  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  outputs:
    output_formatter:
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.<product>.imagery_annotated_enhanced
      output_checker_name: image
spec:
  globals:
    product_name: Infrared
    sector_list: ["test_goes16_eqc_3km_night_20200918T1950Z"]
    variables: ["B14BT"]
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments: {
        resampled_read: True,
      }
    interpolator:
      kind: interpolator
      name: interp_nearest
    algorithm:
      kind: algorithm
      name: single_channel
      arguments: {
        output_data_range: [-90.0, 30.0],
        input_units: Kelvin,
        output_units: celsius,
        min_outbounds: crop,
        max_outbounds: crop,
        norm: false,
        inverse: false,
      }
    # coverage_checker is used in this product but not specified in the SSP as well
    # during the testing should be added just before the filename_formatter
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
    colormapper:
      kind: colormapper
      name: Infrared
      arguments:
        data_range: [-90.0, 30.0]
    feature_annotator:
      kind: feature_annotator
      name: default_oldlace
    gridline_annotator:
      kind: gridline_annotator
      name: default_palegreen
    output_formatter:
      kind: output_formatter
      name: imagery_clean
    # output_checker:
    #   kind: output_checker
