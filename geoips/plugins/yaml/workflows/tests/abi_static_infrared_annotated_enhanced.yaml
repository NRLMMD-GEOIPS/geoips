# script migration = done
# product testing = done

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: abi_static_infrared_annotated_enhanced
docstring: |
  This product utilizes channel 14 (11.2 µm) and highlights areas of deep convection within a Tropical Cyclone.
description: 11.2 µm Infrared.
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.Infrared.imagery_clean
      output_checker_name: image
  # steps:
  #   reader:
  #     area_def: null
  #   abi_Infrared:
  #     spec:
  #       steps:
  #         algorithm:
  #           output_units: Kelvin
  # kinds:
  #   readers:
  #     satellite_zenith_angle_cutoff: 80
  globals:
    # sector_list: test_goes16_eqc_3km_night_20200918T1950Z
    logging_level: info
spec:
  steps:
    reader:
      kind: reader
      name: abi_netcdf
      arguments:
        chans: ['B14BT']
    sector:
      kind: sector
      name: test_goes16_eqc_3km_day_20200918T1950Z
    abi_Infrared:
      kind: product
      name: [abi, Infrared]
      depends_on: [reader, sector]
    gridlines:
      kind: gridline_annotator
      name: default
    features:
      kind: feature_annotator
      name: default
    check_coverage:
      kind: coverage_checker
      name: masked_arrays
      depends_on: [abi_Infrared.algorithm, sector]
      arguments:
        variable_name: data
    create_filenames:
      kind: filename_formatter
      name: geoips_fname
      # I don't like this and will look into a solution
      # We provide the Product step to get product_name but I think that is also
      # available from abi_Infrared.algorithm.
      # Additionally, xarr_obj isn't available from the Product. To get that you
      # have to dig to the algorithm. I think I'd prefer if the Product carried
      # the output data as well. We'll see.
      depends_on: [abi_Infrared.algorithm, sector, check_coverage]
      arguments:
        product_name: Infrared
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      depends_on:
        - abi_Infrared.algorithm
        - abi_Infrared.colormapper
        - create_filenames
        - gridlines
        - features
        - sector
      arguments:
        product_name: Infrared
        product_name_title: G16 Infrared @ 11.2 um
