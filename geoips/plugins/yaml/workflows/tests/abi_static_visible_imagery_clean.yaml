# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: abi_static_visible_imagery_clean
docstring: |
  ABI Visible clean imagery over a static equirectangular land-ocean sector using
  GOES-16 data.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.<product>.imagery_clean
      output_checker_name: image
spec:
  globals:
    product_name: Visible
    reader_defined_area_def: False
    # will be uncommented after split operation is implemented
    # sector_list: ["test_goeseast_eqc_3km_landocean"]
  steps:
    sector:
      kind: sector
      name: test_goeseast_eqc_3km_landocean
    reader:
      kind: reader
      name: abi_netcdf
      arguments: 
        resampled_read: True
      depends_on: [sector]
    abi_Visible:
      kind: product
      name: [abi, Visible]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [abi_Visible.algorithm, sector]
    output_formatter:
      kind: output_formatter
      name: imagery_clean
