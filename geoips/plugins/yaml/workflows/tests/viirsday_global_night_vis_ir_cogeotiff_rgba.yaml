# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: viirsday_global_night_vis_ir_cogeotiff_rgba
docstring: ADD THIS.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_viirs/data/jpss/20210209/073600/VJ102DNB.A2021040.0736.002.2021040145245.nc
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/viirsday.global.<product>.cogeotiff_rgba
      output_checker_name: geotiff
spec:
  globals:
    product_name: Night-Vis-IR
    reader_defined_area_def: False
    # will be uncommented after split operation is implemented
    # sector_list: ["global_cylindrical"]
    minimum_coverage: 0 
  steps:
    sector:
      kind: sector
      name: global_cylindrical
    reader:
      kind: reader
      name: viirs_netcdf
      depends_on: [sector]
    viirs_Night_Vis_IR:
      kind: product
      name: [viirs, Night-Vis-IR]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geotiff_fname
      depends_on:
        - viirs_Night_Vis_IR.algorithm
        - sector
        - viirs_Night_Vis_IR.coverage_checker
    output_formatter:
      kind: output_formatter
      name: cogeotiff_rgba
      depends_on:
        - viirs_Night_Vis_IR.algorithm
        - viirs_Night_Vis_IR.colormapper
        - filename_formatter
        - sector
