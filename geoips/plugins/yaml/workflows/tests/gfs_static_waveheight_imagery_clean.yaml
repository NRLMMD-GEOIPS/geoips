# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: gfs_static_waveheight_imagery_clean
docstring: |
  GFS Model wave height clean imagery over the static CONUS sector from a GRIB2 west
  coast wave forecast.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_gfs/data/gfswave.t06z.wcoast.0p16.f000.grib2
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/gfs.static.waveheight.imagery_clean
      output_checker_name: image
spec:
  globals:
    product_name: Model-WaveHeight
    reader_defined_area_def: False
    # sector_list: ["conus"]
    minimum_coverage: 0 
  steps:
    sector:
      kind: sector
      name: conus
    reader:
      kind: reader
      name: gfs_grib
      depends_on: [sector]
    gfs_Model_WaveHeight:
      kind: product
      name: [gfs, Model-WaveHeight]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
    output_formatter:
      kind: output_formatter
      name: imagery_clean
