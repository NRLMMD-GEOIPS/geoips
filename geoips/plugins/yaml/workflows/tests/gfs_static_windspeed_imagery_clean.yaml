# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: gfs_static_windspeed_imagery_clean
docstring: |
  GFS Model wind speed clean imagery over the static Himawari sector from a GRIB2
  global pressure forecast.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_gfs/data/gfs.t06z.pgrb2.0p25.f000
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/gfs.static.windspeed.imagery_clean
      output_checker_name: image
spec:
  globals:
    product_name: Model-Windspeed
    reader_defined_area_def: False
    # will be uncommented after split operation is implemented
    # sector_list: ["himawari"]
    minimum_coverage: 0 
  steps:
    sector:
      kind: sector
      name: himawari
    reader:
      kind: reader
      name: gfs_grib
      depends_on: [sector]
    gfs_Model_Windspeed:
      kind: product
      name: [gfs, Model-Windspeed]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [gfs_Model_Windspeed.algorithm, sector, gfs_Model_Windspeed.coverage_checker]
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      depends_on:
        - gfs_Model_Windspeed.algorithm
        - gfs_Model_Windspeed.colormapper
        - filename_formatter
        - sector
