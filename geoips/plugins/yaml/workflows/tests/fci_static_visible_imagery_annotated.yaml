# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: fci_static_visible_imagery_annotated
docstring: |
  FCI Visible annotated imagery over a static global cylindrical sector using
  Meteosat Third Generation data.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_fci/data/20250623/1200/W_XX-*.nc
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/fci.static.<product>.imagery_annotated
      output_checker_name: image
spec:
  globals:
    product_name: Visible
    reader_defined_area_def: False
    # sector_list: ["global_cylindrical"]
  steps:
    sector:
      kind: sector
      name: global_cylindrical
      depends_on: []
    reader:
      kind: reader
      name: fci_netcdf
      depends_on: [sector]
    fci_Visible:
      kind: product
      name: [fci, Visible]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [fci_Visible.algorithm, sector]
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
