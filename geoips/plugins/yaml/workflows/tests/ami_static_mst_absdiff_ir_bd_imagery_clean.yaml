# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: ami_static_mst_absdiff_ir_bd_imagery_clean
docstring: |
  AMI absdiff-IR-BD multi-scan-time absolute difference clean imagery over the static
  GEO-KOMPSAT sector.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_multi_scan_times/data/geokompsat-ami/LA/*ir112*.nc
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/ami.static.mst.<product>.imagery_clean
      output_checker_name: image
spec:
  globals:
    product_name: absdiff-IR-BD
    reader_defined_area_def: False
    # will be uncommented after split operation is implemented
    # sector_list: ["geokompsat"]
    minimum_coverage: 0 
  steps:
    sector:
      kind: sector
      name: geokompsat
    reader:
      kind: reader
      name: ami_netcdf
      depends_on: [sector]
    ami_absdiff_IR_BD:
      kind: product
      name: [ami, absdiff-IR-BD]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
    output_formatter:
      kind: output_formatter
      name: imagery_clean
