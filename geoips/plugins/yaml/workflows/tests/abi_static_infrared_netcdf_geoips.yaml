# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: abi_static_infrared_netcdf_geoips
docstring: |
  GOES-16 ABI infrared brightness temperature in GeoIPS NetCDF over a static
  equirectangular night sector.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_abi/data/goes16_20200918_1950/*
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/abi.static.<product>.netcdf_geoips
      output_checker_name: netcdf
spec:
  globals:
    product_name: Infrared
    reader_defined_area_def: False
    # will be uncommented after split operation is implemented
    # sector_list: ["test_goes16_eqc_10km_edge_night_20200918T1950Z"]
  steps:
    sector:
      kind: sector
      name: test_goes16_eqc_10km_edge_night_20200918T1950Z
    reader:
      kind: reader
      name: abi_netcdf
      arguments: 
        resampled_read: True
      depends_on: [sector]
    abi_Infrared:
      kind: product
      name: [abi, Infrared]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_netcdf_fname
      depends_on: [abi_Infrared.algorithm, sector]
    output_formatter:
      kind: output_formatter
      name: netcdf_geoips
      depends_on: [abi_Infrared.algorithm, filename_formatter, sector]
