# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: mimic_coarse_static_tpw_cimss_imagery_annotated
docstring: |
  MIMIC coarse-resolution CIMSS total precipitable water annotated imagery over a
  static global cylindrical sector.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_tpw/data/coarse/comp20210723.000000.nc
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/mimic_coarse.static.TPW-CIMSS.imagery_annotated
      output_checker_name: image
spec:
  globals:
    product_name: TPW-CIMSS
    reader_defined_area_def: False
    # sector_list: ["global_cylindrical"]
  steps:
    sector:
      kind: sector
      name: global_cylindrical
    reader:
      kind: reader
      name: mimic_netcdf
      depends_on: [sector]
    mimic_TPW-CIMSS:
      kind: product
      name: [mimic, TPW-CIMSS]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
    output_formatter:
      kind: output_formatter
      name: imagery_annotated
