# product testing = done

apiVersion: geoips/v1
interface: workflows
family: order_based
name: seviri_airmass_imagery_clean
docstring: SEVIRI Airmass RGB imagery over a European equidistant cylindrical sector.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_seviri/data/20250624/1200/H-000-MSG3*
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/seviri.airmass.imagery_clean
      output_checker_name: image
spec:
  globals:
    product_name: airmass
    reader_defined_area_def: False
    # will be uncommented after split operation is implemented
    # sector_list: ["test_meteoeu_eqc_3km_landocean"]
  steps:
    sector:
      kind: sector
      name: test_meteoeu_eqc_3km_landocean
    reader:
      kind: reader
      name: seviri_hrit
      depends_on: [sector]
    seviri_airmass:
      kind: product
      name: [seviri, airmass]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [seviri_airmass.algorithm, sector, seviri_airmass.coverage_checker]
    output_formatter:
      kind: output_formatter
      name: imagery_clean
      depends_on: 
        - seviri_airmass.algorithm
        - seviri_airmass.colormapper
        - filename_formatter
        - sector
