# script migration = done
# product testing = ongoing

# Default values - if you do not have this exact test case available, call with available data files / sectors.
# This exact test case required for valid comparisons - remove "compare_path" argument if running a different
# set of arguments.

apiVersion: geoips/v1
interface: workflows
family: order_based
name: sgli_static_ir_rgb_imagery_clean
docstring: ADD THIS.
package: geoips
test:
  fnames: !ENV ${GEOIPS_TESTDATA_DIR}/test_data_sgli/data/20251018T0233/*DL*.h5
  outputs:
    output_formatter:
      full_test_policy: on_token_mismatch # always | never
      compare_path: !ENV ${GEOIPS_PACKAGES_DIR}/geoips/tests/outputs/sgli.static.<product>.imagery_clean
      output_checker_name: ADD THIS
spec:
  globals:
    product_name: IR-RGB
    reader_defined_area_def: False
    # sector_list: ["korea"]
    minimum_coverage: 0 
  steps:
    sector:
      kind: sector
      name: korea
      depends_on: []
    reader:
      kind: reader
      name: sgli_l1b_hdf5
      depends_on: [sector]
    sgli_IR-RGB:
      kind: product
      name: [sgli, IR-RGB]
      depends_on: [sector, reader]
    filename_formatter:
      kind: filename_formatter
      name: geoips_fname
      depends_on: [sgli_IR-RGB.algorithm, sector, check_coverage]
    output_formatter:
      kind: output_formatter
      name: imagery_clean
